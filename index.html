<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Intro SE331</title>
    <!-- Import Styles -->
    <link rel="stylesheet" href="./assets/styles.css" />
    <!-- Import Vue.js -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app">
        <div class="nav-bar">Cart {{cart}}</div>
        <div class="product-display">
            <div class="product-container">
                <div class="product-image">
                    <img :src="image" :class="{outOfStockImage: !inStock}">
                </div>
            </div>
        </div>
        <div class="product-info">
            <h1><a :href="link">{{ product }}</a></h1>
            <p v-if="!inStock">Out of Stock</p>
            <p v-else-if="inventory > 10">In stock</p>
            <p v-else-if="inventory <= 10 && inventory > 0">Almost out of stock</p>
            <p v-else>Out of stock</p>
            <p>{{ description }}</p>
            <p v-if="onSale" style="color: red;">SALE!</p>
            <ul>
                <li v-for="detail in details">
                    {{ detail }}
                </li>
            </ul>
            <div v-for="variant in variants" :key="variant.id" @mouseover="updateImage(variant.image)" 
            class="color-circle" :style="{backgroundColor: variant.color}">
                {{ variant.color }} ({{ variant.size}})
            </div>
            <button class="button" @click="addToCart" 
            :disabled="!inStock" :class="{disabledButton: !inStock}">Add to Cart</button>
            <button class="button" @click="toggleInStock">Toggle In stock</button>
        </div>
    </div>

    <!-- Import Js -->
    <script src="./main.js"></script>
</body>
<style>
    .color-circle {
        width: 50px;
        height: 50px;
        margin-top: 8px;
        border: 2px solid #d8d8d8;
        border-radius: 50%;
    }
    .disabledButton {
        background-color: #d8d8d8;
        cursor: not-allowed;
    }
    .outOfStockImage {
        filter: grayscale(100%);
        cursor: not-allowed;
    }
</style>
</html>
